
{% extends "base.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div class="text-center mt-5 animate__animated animate__bounceIn">
    <div class="error mx-auto" data-text="404" style="font-size: 8rem; font-weight: 800; color: var(--primary-color);">404</div>
    <p class="lead text-gray-800 mb-5">Page Not Found</p>
    <p class="text-gray-500 mb-0">It looks like you found a glitch in the matrix...</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary mt-4">
        <i class="fas fa-arrow-left me-2"></i> Back to Dashboard
    </a>
</div>
{% endblock %}
