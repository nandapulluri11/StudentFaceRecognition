
{% extends "base.html" %}

{% block title %}Login - Educational Portal{% endblock %}

{% block extra_css %}
<style>
    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .login-card {
        max-width: 400px;
        width: 100%;
        border-radius: 1.5rem;
        padding: 2.5rem;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
        box-shadow: 0 1rem 3rem rgba(0,0,0,0.175);
    }

    .form-control {
        border-radius: 0.75rem;
        padding: 0.75rem 1.25rem;
        border: 1px solid #e0e0e0;
        background: rgba(255, 255, 255, 0.8);
    }

    .form-control:focus {
        box-shadow: 0 0 0 0.25rem rgba(118, 75, 162, 0.25);
        border-color: #764ba2;
    }

    .login-btn {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        color: white;
        padding: 0.75rem;
        border-radius: 0.75rem;
        width: 100%;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05rem;
        margin-top: 1.5rem;
    }

    .login-btn:hover {
        opacity: 0.9;
        transform: translateY(-2px);
    }

    .login-logo {
        font-size: 3rem;
        color: #764ba2;
        margin-bottom: 1.5rem;
        text-align: center;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-card animate__animated animate__zoomIn">
    <div class="login-logo">
        <i class="fas fa-graduation-cap"></i>
    </div>
    <h3 class="text-center mb-4 fw-bold">Welcome Back</h3>
    
    <form method="POST">
        <div class="mb-3">
            <label class="form-label fw-bold">Username</label>
            <div class="input-group">
                <span class="input-group-text bg-transparent border-end-0"><i class="fas fa-user text-muted"></i></span>
                <input type="text" name="username" class="form-control border-start-0" placeholder="Enter username" required autofocus>
            </div>
        </div>
        
        <div class="mb-4">
            <label class="form-label fw-bold">Password</label>
            <div class="input-group">
                <span class="input-group-text bg-transparent border-end-0"><i class="fas fa-lock text-muted"></i></span>
                <input type="password" name="password" class="form-control border-start-0" placeholder="Enter password" required>
            </div>
        </div>
        
        <button type="submit" class="btn login-btn">
            Sign In <i class="fas fa-arrow-right ms-2"></i>
        </button>
    </form>
    
    <div class="mt-4 text-center">
        <small class="text-muted">Faculty: faculty1 / password</small><br>
        <small class="text-muted">Student: student1 / password</small>
    </div>
</div>
{% endblock %}
